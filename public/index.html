<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHALAH VOID 404 - Pairing</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #ff0000; 
            font-family: 'Orbitron', sans-serif; 
            text-align: center; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container { 
            border: 2px solid #ff0000; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 0 25px #ff0000; 
            width: 90%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.8);
        }
        h1 { font-size: 22px; text-shadow: 0 0 10px #ff0000; margin-bottom: 20px; }
        p { font-size: 12px; color: #ccc; margin-bottom: 15px; }
        input { 
            background: #1a1a1a; 
            border: 1px solid #ff0000; 
            color: white; 
            padding: 12px; 
            width: 100%; 
            text-align: center; 
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }
        button { 
            background: #ff0000; 
            color: black; 
            border: none; 
            padding: 12px; 
            width: 100%;
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 15px; 
            border-radius: 5px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        #codeDisplay { 
            font-size: 28px; 
            margin-top: 25px; 
            letter-spacing: 5px; 
            color: #fff; 
            text-shadow: 0 0 15px #ff0000;
            min-height: 40px;
        }
        img { 
            width: 130px; 
            border-radius: 50%; 
            border: 3px solid #ff0000; 
            margin-bottom: 15px;
            animation: glow 2s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px #ff0000; }
            to { box-shadow: 0 0 25px #ff0000; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://files.catbox.moe/90yqxb.png" alt="Logo">
        <h1>تشالاه فويد ٤٠٤</h1>
        <p>ENTER PHONE NUMBER WITH COUNTRY CODE (947xxxxxxxxx)</p>
        <input type="text" id="number" placeholder="94712345678"> <br>
        <button onclick="getPairingCode()">GET PAIRING CODE</button>
        <div id="codeDisplay"></div>
    </div>

    <script>
        // ඔයාගේ පරණ function එක ඒ විදිහටම ඇඩ් කරලා තියෙන්නේ
        async function getPairingCode() {
            const num = document.getElementById('number').value;
            const display = document.getElementById('codeDisplay');
            
            if(!num) {
                display.innerText = "ENTER NUMBER";
                return;
            }

            display.innerText = "GENERATING...";
            try {
                // Backend එකෙන් pair code එක fetch කරන කොටස
                const response = await fetch(`/pair?number=${num}`);
                const data = await response.json();
                display.innerText = data.code || "ERROR";
            } catch (err) {
                display.innerText = "FAILED TO FETCH";
            }
        }
    </script>
</body>
</html>
